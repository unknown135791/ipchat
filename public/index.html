<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>IPChat - Secure, Premium Real-Time Rooms</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>💬</text></svg>">

</head>
<body>

<div class="container">

    <h1>IPChat</h1>

    <!-- Glassmorphic Error Notification Card -->
    <div id="errorCard" class="error-card">
        <span id="errorText"></span>
    </div>

    <input
        type="text"
        id="usernameInput"
        placeholder="Enter Username"
        maxlength="20"
    >

    <input
        type="text"
        id="roomInput"
        placeholder="Enter Room ID"
        maxlength="20"
    >

    <button id="joinBtn">
        Join Room
    </button>

    <!-- Subtle Credit Footer -->
    <div class="footer-credit">Developed by Mohit</div>

</div>

<script src="js/index.js"></script>

</body>
</html>
